name: Deploy MCP Servers to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy servers
        run: |
          for server in $(python scripts/detect_changed_servers.py); do
            echo "Processing $server..."

            EXISTS=$(az containerapp show \
              --name $server \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --query "name" -o tsv 2>/dev/null || echo "")

            ENTRY_POINT=$(echo $server | sed 's/-server//' | tr '-' '_')

            DEPLOY_ENV=prod IMAGE_TAG=${{ github.sha }} SERVER_NAME=$server \
              python deployment/scripts/generate_aca_configs.py

            az acr build \
              --registry ${{ secrets.AZURE_REGISTRY_NAME }} \
              --image $server:${{ github.sha }} \
              --file mcp-servers/$server/Dockerfile \
              .

            if [ -z "$EXISTS" ]; then
              az containerapp create \
                --name $server \
                --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                --yaml deployment/aca/$server.yaml
            else
              az containerapp update \
                --name $server \
                --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                --image ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/$server:${{ github.sha }}
            fi

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add deployment/aca/$server.yaml
            git diff --staged --quiet || git commit -m "chore: update aca config for $server [skip ci]"
          done
          git push || true
