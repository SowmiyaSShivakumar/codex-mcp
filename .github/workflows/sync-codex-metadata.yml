name: Sync Codex Metadata

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
    paths:
      - "mcp-*/AGENTS.md"
      - "mcp-*/.codex/**"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get aggregation script from main
        run: git checkout origin/main -- scripts/generate_codex_metadata.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run aggregation script
        run: python scripts/generate_codex_metadata.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md .codex/
          if git diff --staged --quiet; then
            echo "No changes to root files."
          else
            git commit -m "chore: auto-sync root AGENTS.md and .codex/skills [skip ci]"
            git push
          fi
