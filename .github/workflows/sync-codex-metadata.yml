name: Sync Codex Metadata

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
    paths:
      - "**/AGENTS.md"
      - "**/.codex/skills/**"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bring in other MCP servers from main and run script
        run: |
          git fetch origin main
          for dir in $(git ls-tree --name-only origin/main); do
            if [ ! -d "$dir" ] && git show origin/main:"$dir/AGENTS.md" > /dev/null 2>&1; then
              git archive origin/main "$dir" | tar -x
            fi
          done
          git show origin/main:scripts/generate_codex_metadata.py > /tmp/generate_codex_metadata.py
          python /tmp/generate_codex_metadata.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md .codex/
          if git diff --staged --quiet; then
            echo "No changes to root files."
          else
            git commit -m "chore: auto-sync root AGENTS.md and .codex/skills [skip ci]"
            git push
          fi
